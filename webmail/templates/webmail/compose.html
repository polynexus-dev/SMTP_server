{% extends "webmail/base.html" %}
{% block title %}Compose Message{% endblock %}
{% block content %}
<div class="content-header">
  <div class="folder-title">
    <i class="bi bi-pencil-square folder-icon"></i>
    <h1>New Message</h1>
  </div>
</div>

<div class="compose-card">
  <form method="post" enctype="multipart/form-data" class="compose-form">
    {% csrf_token %}
    
    <div class="form-group row-group">
      <label for="fromAddress">From</label>
      <input type="text" id="fromAddress" value="{{ mailbox.address }}" disabled class="form-control mono">
    </div>
    
    <div class="form-group row-group">
      <label for="toAddress">To</label>
      <input type="text" id="toAddress" name="to" value="{{ to }}" required placeholder="recipient@example.com (comma separated for multiple)" class="form-control" autofocus>
    </div>
    
    <div class="form-group row-group">
      <label for="subjectInput">Subject</label>
      <input type="text" id="subjectInput" name="subject" value="{{ subject }}" placeholder="Enter subject line..." class="form-control">
    </div>
    
    <div class="form-group text-group">
      <label for="messageBody">Message</label>
      <textarea id="messageBody" name="body" rows="15" placeholder="Write your message here..." class="form-control text-body-control"></textarea>
    </div>
    
    <div class="form-group file-group">
      <label for="fileAttachments">
        <i class="bi bi-paperclip"></i>
        <span>Attach Files</span>
      </label>
      <input type="file" id="fileAttachments" name="attachments" multiple class="file-control">
      <div class="file-help-text">You can select multiple files to upload as attachments.</div>
    </div>
    
    <div class="compose-actions">
      <button class="btn btn-primary btn-send" type="submit">
        <i class="bi bi-send-fill"></i>
        <span>Send Message</span>
      </button>
      <a href="{% url 'inbox' %}" class="btn btn-secondary btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
