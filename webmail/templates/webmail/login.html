{% extends "webmail/base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<h1>Sign in</h1>
<form method="post" style="max-width:22rem">
  {% csrf_token %}
  {% if form.errors %}<div class="flash">Wrong username or password.</div>{% endif %}
  <div class="row"><label>Email address {{ form.username }}</label></div>
  <div class="row"><label>Password {{ form.password }}</label></div>
  <button class="btn" type="submit">Sign in</button>
</form>
{% endblock %}
