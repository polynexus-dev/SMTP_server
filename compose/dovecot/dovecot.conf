## MailStack Dovecot — IMAPS + LMTP, virtual users from the Django database.
protocols = imap lmtp
log_path = /dev/stderr
mail_location = maildir:/var/vmail/%d/%n
mail_uid = vmail
mail_gid = vmail
first_valid_uid = 5000
last_valid_uid = 5000

ssl = required
ssl_cert = </etc/letsencrypt/live/mail/fullchain.pem
ssl_key  = </etc/letsencrypt/live/mail/privkey.pem
ssl_min_protocol = TLSv1.2

auth_mechanisms = plain login
auth_master_user_separator = *

passdb {
  driver = passwd-file
  args = /etc/dovecot/master-users
  master = yes
  result_success = continue   # still look the target user up in SQL
}
passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}
userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# LMTP delivery from Postfix.
service lmtp {
  inet_listener lmtp {
    port = 24
  }
}
# SASL auth socket Postfix submission uses.
service auth {
  inet_listener {
    port = 12345
  }
}

protocol lmtp {
  mail_plugins = $mail_plugins sieve quota
}
protocol imap {
  mail_plugins = $mail_plugins quota imap_quota
  mail_max_userip_connections = 20
}

plugin {
  quota = maildir:User quota
  quota_rule = *:storage=2G       # overridden per user from SQL userdb_quota_rule
  sieve = file:~/sieve;active=~/.dovecot.sieve
}

namespace inbox {
  inbox = yes
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }
}
