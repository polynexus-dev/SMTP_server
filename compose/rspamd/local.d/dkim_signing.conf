# Sign all authenticated outbound mail. Generate keys with:
#   docker compose exec rspamd rspamadm dkim_keygen -d example.com -s mail \
#     -k /var/lib/rspamd/dkim/example.com.mail.key
# then publish the printed TXT record at mail._domainkey.example.com.
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector = "mail";
sign_authenticated = true;
use_domain = "header";
allow_username_mismatch = true;
